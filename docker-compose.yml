services:
  frontend:
    build:
      context: ./frontend
    environment:
      GATEWAY_URL: http://gateway:8000
    ports:
      - "8501:8501"
    depends_on:
      - gateway

  gateway:
    build:
      context: ./gateway
    environment:
      GATEWAY_PORT: "8000"
      STAT_URL: http://stat:8002
      NLP_URL: http://nlp:8001
    ports:
      - "8000:8000"
    depends_on:
      - stat
      - nlp

  nlp:
    build:
      context: ./nlp
    environment:
      NLP_PORT: "8001"
    ports:
      - "8001:8001"

  stat:
    build:
      context: ./stat
    environment:
      STAT_PORT: "8002"
      SQLITE_PATH: /tmp/listenai.db
    ports:
      - "8002:8002"
